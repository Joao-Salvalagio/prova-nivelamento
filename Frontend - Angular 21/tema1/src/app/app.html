<h1>Gestão de Veículos</h1>

<fieldset>
  <legend>Veículo</legend>
  <form (ngSubmit)="saveVeiculo()">
    Modelo: <input name="modelo" [(ngModel)]="veiculo.modelo" required>
    Ano: <input name="ano" type="number" [(ngModel)]="veiculo.anoFabricacao" required>
    Placa: <input name="placa" [(ngModel)]="veiculo.placa" required>
    <button type="submit">Salvar Veículo</button>
  </form>
</fieldset>

<br>

<fieldset>
  <legend>Acessório</legend>
  <form (ngSubmit)="saveAcessorio()">
    ID Veículo: <input name="idVeiculo" type="number" [(ngModel)]="acessorio.idVeiculo" required>
    Nome: <input name="nome" [(ngModel)]="acessorio.nome" required>
    <button type="submit">Salvar Acessório</button>
  </form>
</fieldset>

<br>

<table [border]="1" [cellPadding]="5" style="border-collapse: collapse; width: 100%;">
  <thead>
  <tr>
    <th>ID</th>
    <th>Modelo</th>
    <th>Ano</th>
    <th>Placa</th>
    <th>Acessórios</th>
    <th>Ações</th>
  </tr>
  </thead>
  <tbody>
    @for (v of veiculos; track v.id) {
      <tr>
        <td>{{ v.id }}</td>
        <td>{{ v.modelo }}</td>
        <td>{{ v.anoFabricacao }}</td>
        <td>{{ v.placa }}</td>
        <td>
          <ul>
            @for(a of v.acessorios; track a.id) {
              <li>
                {{ a.nome }}
                <button (click)="updateAcessorio(a, v.id!)">Editar</button>
                <button (click)="deleteByIdAcessorio(a.id!)">Excluir</button>
              </li>
            }
          </ul>
        </td>
        <td>
          <button (click)="updateVeiculo(v)">Editar</button>
          <button (click)="deleteByIdVeiculo(v.id!)">Excluir</button>
        </td>
      </tr>
    }
  </tbody>
</table>
